name: CI

# Runs on every push, to every branch — catches lint/format/type/test
# regressions before they ever reach a PR or a tag.
# Scoped to branches only: without this, a tag push (which also fires `push`)
# would re-run CI against code a branch push had already just tested.
on:
  push:
    branches:
      - '**'

env:
  HUSKY: 0 # skip git-hook install; irrelevant on a CI runner

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

      - run: npm run typecheck

      # mongodb-memory-server downloads a real mongod binary on first run —
      # cache it so every run after the first skips that download.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}

      - run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

      - run: npm run build
