# ====================================================================
# docker-compose.yml (Production)
# Runs the production build with optimized settings
# ====================================================================

services:
  chatify:
    image: chatify:latest
    container_name: chatify-prod
    build:
      context: .
      dockerfile: Dockerfile
      # Cache multi-stage builds for faster rebuilds
      cache_from:
        - chatify:latest
    ports:
      - "3000:3000"
    env_file:
      - .env.docker.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    # Resource limits (optional but recommended for production)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Optional: Add networks for better organization
networks:
  default:
    name: chatify-network